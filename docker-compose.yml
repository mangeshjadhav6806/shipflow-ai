# =============================================================================
# ShipFlow AI — Docker Compose Configuration
# PostgreSQL 16 + pgAdmin 4 (optional)
# =============================================================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose up -d postgres  # Start only PostgreSQL
#   docker compose down            # Stop all services
#   docker compose down -v         # Stop and remove volumes (DESTRUCTIVE)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: shipflow_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: shipflow
      POSTGRES_PASSWORD: shipflow_secret
      POSTGRES_DB: shipflow_db
      PGDATA: /var/lib/postgresql/data/pgdata

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipflow -d shipflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - shipflow_network

    labels:
      - "com.shipflow.service=postgres"
      - "com.shipflow.milestone=0.5"

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — Web-based PostgreSQL management UI (optional)
  # Access at: http://localhost:5050
  # Login: admin@shipflow.ai / shipflow_admin
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shipflow_pgadmin
    restart: unless-stopped
    profiles:
      - tools  # Only starts with: docker compose --profile tools up -d

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shipflow.ai
      PGADMIN_DEFAULT_PASSWORD: shipflow_admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - shipflow_network

    labels:
      - "com.shipflow.service=pgadmin"

# =============================================================================
# Named Volumes (persists data across container restarts)
# =============================================================================
volumes:
  postgres_data:
    driver: local
    labels:
      - "com.shipflow.volume=postgres-data"

  pgadmin_data:
    driver: local
    labels:
      - "com.shipflow.volume=pgadmin-data"

# =============================================================================
# Network (isolated bridge network for service communication)
# =============================================================================
networks:
  shipflow_network:
    driver: bridge
    labels:
      - "com.shipflow.network=primary"
